services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=change-this-secret-key-in-production-min-32-chars
      - DATABASE_URL=sqlite:///./database/tasks.db
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - db_data:/app/database
    restart: unless-stopped

volumes:
  db_data:
