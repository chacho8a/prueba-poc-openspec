services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=test-secret-key-for-ui-tests-min-32-chars
      - DATABASE_URL=sqlite:///./database/test_ui.db
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 10s
      retries: 5

  test-ui:
    build:
      context: .
      dockerfile: Dockerfile.test.ui
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BASE_URL=http://backend:8000
    volumes:
      - ./test-results:/app/test-results
