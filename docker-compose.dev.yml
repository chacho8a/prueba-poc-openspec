version: '3.8'

services:
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - db_data:/app/database
    environment:
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=sqlite:///./database/tasks.db
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30

volumes:
  db_data:
